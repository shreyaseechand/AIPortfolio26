<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Shreyasee Chand — Enter password</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#121212" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #121212;
      --on-dark: #faf9f5;
      --on-dark-soft: #9b978e;
      --hair: rgba(250,249,245,.18);
      --error: #c96156;
      --font-display: "Cormorant Garamond", "EB Garamond", Garamond, "Times New Roman", serif;
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--on-dark);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    .gate { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 32px; }
    .card {
      width: 100%; max-width: 420px; text-align: center;
      display: flex; flex-direction: column; align-items: center;
      animation: rise 1s cubic-bezier(.2,.6,.2,1) both;
    }
    @keyframes rise { from { opacity:0; transform: translateY(14px) } to { opacity:1; transform:none } }

    /* rotated on the wrapper so the success pulse (scale on the svg) still works */
    .scan { width: 176px; margin-bottom: 30px; transform: rotate(-20deg); }
    .scan .scan__svg { width: 100%; height: auto; }

    .role {
      font-family: var(--font-mono); font-size: 12px; letter-spacing: 5px;
      text-transform: uppercase; color: var(--on-dark-soft); margin-bottom: 8px;
    }
    .name {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(38px, 8vw, 52px); line-height: 1.02;
      letter-spacing: -1px; color: var(--on-dark); margin-bottom: 30px;
    }

    /* no button — the scan itself is the feedback; verification is automatic */
    .form {
      display: inline-flex; width: 100%; max-width: 340px;
      border: 1px solid var(--hair); border-radius: 10px;
      background: rgba(250,249,245,.04); overflow: hidden;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .form:focus-within { border-color: rgba(250,249,245,.45); box-shadow: 0 0 0 4px rgba(250,249,245,.05); }
    .input {
      flex: 1; background: transparent; border: 0; outline: 0;
      color: var(--on-dark); font-family: var(--font-body);
      font-size: 16px; /* 16px minimum — anything smaller makes iOS zoom in on focus */
      padding: 15px 18px;
    }
    .input::placeholder { color: var(--on-dark-soft); }

    .error { min-height: 18px; margin-top: 12px; font-size: 13px; color: var(--error); opacity: 0; transition: opacity .2s ease; }
    .error.is-visible { opacity: 1; }
    .card.is-shaking .form { animation: shake .4s ease; }
    @keyframes shake {
      10%,90%{transform:translateX(-1px)} 20%,80%{transform:translateX(2px)}
      30%,50%,70%{transform:translateX(-5px)} 40%,60%{transform:translateX(5px)}
    }

    .nopass {
      margin-top: 18px; font-size: 13px; color: var(--on-dark-soft);
      display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    }
    .ic {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid var(--hair); color: var(--on-dark);
      transition: background-color .18s ease, transform .18s ease, border-color .18s ease;
    }
    .ic:hover { background: rgba(250,249,245,.08); transform: translateY(-2px); border-color: rgba(250,249,245,.4); }
    .ic svg { width: 16px; height: 16px; }

    /* "Copied email address!" tooltip — same pattern as the portfolio footer */
    .copy-tip {
      position: absolute; bottom: calc(100% + 12px); left: 50%;
      transform: translate(-50%, 6px);
      white-space: nowrap; padding: 9px 13px; border-radius: 10px;
      font-size: 12.5px; line-height: 1; font-weight: 500;
      background: var(--on-dark); color: #121212;
      box-shadow: 0 14px 34px rgba(0,0,0,.4);
      opacity: 0; pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 80;
    }
    .copy-tip::after {
      content: ""; position: absolute; top: 100%; left: 50%; margin-left: -6px;
      border: 6px solid transparent; border-top-color: var(--on-dark);
    }
    .is-copied .copy-tip { opacity: 1; transform: translate(-50%, 0); }
    @media (prefers-reduced-motion: reduce) { .copy-tip { transform: translate(-50%, 0); } }

    /* Mobile: compact stack anchored to the top so the scan, name, and input
       all stay on screen when the keyboard takes the bottom half. */
    @media (max-width: 520px) {
      .gate { align-items: flex-start; padding: 6vh 24px 24px; }
      .scan { width: 118px; margin-bottom: 18px; }
      .role { font-size: 11px; letter-spacing: 4px; margin-bottom: 6px; }
      .name { font-size: clamp(30px, 9vw, 38px); margin-bottom: 20px; }
      .error { margin-top: 10px; min-height: 16px; }
      .nopass { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="card" id="card">
      <div class="scan" id="scan"></div>
      <p class="role">Product Designer</p>
      <h1 class="name">Shreyasee Chand</h1>

      <form class="form" id="gateForm" autocomplete="off">
        <input class="input" id="gateInput" type="password" name="site-password" placeholder="Password" aria-label="Password" autofocus required />
      </form>

      <p class="error" id="gateError" role="alert">That's not it. Try again.</p>

      <p class="nopass">
        Don't have the password?
        <a class="ic" data-email-copy href="mailto:shreyaseechand@gmail.com" aria-label="Email Shreyasee">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
          <span class="copy-tip" role="status" aria-live="polite"></span>
        </a>
        <a class="ic" href="https://www.linkedin.com/in/shreyasee-chand-67780a19/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.83-2.05 3.76-2.05 4.02 0 4.76 2.65 4.76 6.1V21h-4v-5.3c0-1.27-.02-2.9-1.77-2.9-1.77 0-2.04 1.38-2.04 2.8V21h-4z"/></svg>
        </a>
      </p>
    </div>
  </main>

  <script src="scan.js"></script>
  <script>
    /* No button, no Enter — verification is AUTOMATIC while typing:
       each keystroke silently checks the password with the server.
       Match → full glow + success pulse → into the portfolio.
       12th character with no match → error state, clear, start over. */
    const scan = createScan(document.getElementById("scan"), {
      baseColor: "#3a3a38", fillColor: "#faf9f5", errorColor: "#c96156",
    });

    const card  = document.getElementById("card");
    const form  = document.getElementById("gateForm");
    const input = document.getElementById("gateInput");
    const error = document.getElementById("gateError");

    const KEYSTROKES = 12;   // glow caps here — and a miss here = error state
    const CAP = 0.85;        // typing tops out here; 100% is the success flood
    let locked = false;      // true while error plays or after success
    let succeeded = false;
    let checkSeq = 0;

    function typedProgress() {
      const len = Math.min(input.value.length, KEYSTROKES);
      return len === 0 ? -1 : (len / KEYSTROKES) * CAP;
    }

    function goSuccess() {
      if (succeeded) return;
      succeeded = true; locked = true;
      input.blur();
      scan.setProgress(1);                          // flood to full glow…
      requestAnimationFrame(() => scan.succeed());  // …springy success pulse
      const back = new URLSearchParams(location.search).get("from");
      // linger on the full-glow success state before entering the site
      setTimeout(() => location.replace(back || "/"), 3000);
    }

    function goError() {
      locked = true;
      requestAnimationFrame(() => scan.fail());     // red flash on lit dashes
      card.classList.remove("is-shaking");
      void card.offsetWidth;
      card.classList.add("is-shaking");
      error.classList.add("is-visible");
      setTimeout(() => {
        input.value = "";
        scan.reset();                               // back to quiet gray
        error.classList.remove("is-visible");
        locked = false;
        input.focus();
      }, 1300);
    }

    async function check(value) {
      const seq = ++checkSeq;
      try {
        const res = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: value }),
        });
        // ignore stale responses (user kept typing) and anything after lock
        if (seq !== checkSeq || locked || succeeded) return;
        if (res.ok) { goSuccess(); return; }
      } catch (_) {
        if (seq !== checkSeq || locked || succeeded) return;
      }
      // no match — if they've hit the 12th character, that's the miss
      if (input.value.length >= KEYSTROKES) goError();
    }

    input.addEventListener("input", function () {
      if (locked || succeeded) return;
      error.classList.remove("is-visible");
      scan.setProgress(typedProgress());
      if (input.value.length > 0) check(input.value);
    });

    // no submit path — Enter just does nothing (verification is automatic)
    form.addEventListener("submit", (e) => e.preventDefault());

    /* Email icon: copy the address instead of following mailto: (on iOS
       without Apple Mail, mailto: triggers a "Restore Mail?" dialog). */
    document.querySelectorAll("[data-email-copy]").forEach(function (link) {
      var tip = link.querySelector(".copy-tip");
      var email = (link.getAttribute("href") || "").replace(/^mailto:/, "").split("?")[0];
      var hideTimer;
      link.addEventListener("click", function (e) {
        e.preventDefault();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(email);
          else {
            var ta = document.createElement("textarea");
            ta.value = email; ta.setAttribute("readonly", "");
            ta.style.position = "fixed"; ta.style.opacity = "0";
            document.body.appendChild(ta); ta.select();
            document.execCommand("copy"); document.body.removeChild(ta);
          }
        } catch (_) {}
        if (tip) tip.textContent = "Copied email address!";
        link.classList.add("is-copied");
        clearTimeout(hideTimer);
        hideTimer = setTimeout(function () { link.classList.remove("is-copied"); }, 2600);
      });
    });
  </script>
</body>
</html>
