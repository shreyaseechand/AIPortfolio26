<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shreyasee Chand — Enter password</title>
  <meta name="robots" content="noindex, nofollow" />
  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/img/favicon-192.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#141413" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       TOKENS — copied verbatim from the portfolio design system
       ============================================================ */
    :root {
      --primary: #141413;
      --primary-active: #3d3d3a;
      --primary-disabled: #e6dfd8;

      --ink: #141413;
      --body: #3d3d3a;
      --body-strong: #252523;
      --muted: #6c6a64;
      --muted-soft: #8e8b82;
      --on-primary: #ffffff;
      --on-dark: #faf9f5;
      --on-dark-soft: #a09d96;

      --canvas: #faf9f5;
      --surface-cream-strong: #e8e0d2;
      --surface-dark: #181715;
      --surface-dark-elevated: #252320;
      --hairline: #e6dfd8;

      --r-xs: 4px;  --r-sm: 6px;  --r-md: 8px;
      --r-lg: 12px; --r-xl: 16px; --r-pill: 9999px;

      --font-display: "Cormorant Garamond", "EB Garamond", "Tiempos Headline", Garamond, "Times New Roman", serif;
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    /* ============================================================
       BASE + shared components (same rules as index.html)
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--surface-dark);
      color: var(--on-dark);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    img { max-width: 100%; display: block; }

    /* Display face — Cormorant, weight 500, negative tracking */
    .display-xl {
      font-family: var(--font-display);
      font-weight: 500;
      color: var(--ink);
      font-size: clamp(40px, 6.4vw, 68px);
      line-height: 1.03;
      letter-spacing: -1.5px;
    }

    .eyebrow {
      font-family: var(--font-body);
      font-size: 12px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-size: 14px; font-weight: 500; line-height: 1;
      height: 44px; padding: 0 22px; border-radius: var(--r-md);
      border: 1px solid transparent; cursor: pointer;
      transition: background-color .18s ease, border-color .18s ease, color .18s ease;
    }
    /* Light button placed on a dark surface — an existing portfolio variant */
    .btn--on-coral { background: var(--canvas); color: var(--ink); }
    .btn--on-coral:active { background: var(--surface-cream-strong); }
    .btn .arrow { transition: transform .18s ease; }
    .btn:hover .arrow { transform: translateX(4px); }

    /* ============================================================
       GATE — layout only; every visible element uses the classes above
       ============================================================ */
    .gate {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      overflow: hidden;
    }
    /* Same topographic texture the site footer uses */
    .gate::before {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      background-image: url("assets/img/FooterBgnd.webp");
      background-size: cover;
      background-position: center;
      opacity: .5;
    }
    .gate::after {
      content: "";
      position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(120% 90% at 50% 45%, rgba(20,20,19,.35), rgba(20,20,19,.86));
    }

    .gate__inner { position: relative; z-index: 1; width: 100%; max-width: 480px; text-align: center; }

    /* Dark-surface overrides, mirroring how .footer re-colours .eyebrow */
    .gate .display-xl { color: var(--on-dark); }
    .gate .eyebrow { color: var(--on-dark-soft); display: block; margin-bottom: 18px; }
    .gate__name { margin-bottom: 40px; }

    .gate__form { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    /* Input: no native form exists in the portfolio, so it's built from the
       same tokens (Inter, --r-md radius, 44px height, hairline border on dark). */
    .gate__input {
      height: 44px;
      width: min(300px, 100%);
      background: rgba(250,249,245,.04);
      border: 1px solid rgba(250,249,245,.22);
      border-radius: var(--r-md);
      color: var(--on-dark);
      font-family: var(--font-body);
      font-size: 15px;
      padding: 0 16px;
      outline: 0;
      transition: border-color .18s ease, box-shadow .18s ease;
    }
    .gate__input::placeholder { color: var(--on-dark-soft); }
    .gate__input:focus { border-color: rgba(250,249,245,.5); box-shadow: 0 0 0 4px rgba(250,249,245,.06); }

    .gate__error {
      min-height: 18px;
      margin-top: 18px;
      font-size: 13px;
      color: #e88a7d;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .gate__error.is-visible { opacity: 1; }
    .gate.is-shaking .gate__form { animation: shake .4s ease; }
    @keyframes shake {
      10%, 90% { transform: translateX(-1px); }
      20%, 80% { transform: translateX(2px); }
      30%, 50%, 70% { transform: translateX(-5px); }
      40%, 60% { transform: translateX(5px); }
    }

    .gate__foot {
      position: relative; z-index: 1;
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap;
      padding: 22px 40px;
      font-size: 13px;
      color: var(--on-dark-soft);
    }
    @media (max-width: 560px) {
      .gate__foot { justify-content: center; text-align: center; }
      .gate__input { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="gate" id="gate">
    <div class="gate__inner">
      <div class="gate__name">
        <span class="eyebrow">Product Designer</span>
        <h1 class="display-xl">Shreyasee Chand</h1>
      </div>

      <form class="gate__form" id="gateForm" autocomplete="off">
        <input
          class="gate__input"
          id="gateInput"
          type="password"
          name="site-password"
          placeholder="Password"
          aria-label="Password"
          autofocus
          required
        />
        <button class="btn btn--on-coral" type="submit" id="gateSubmit">
          Enter <span class="arrow" aria-hidden="true">&rarr;</span>
        </button>
      </form>

      <p class="gate__error" id="gateError" role="alert">Incorrect password. Try again.</p>
    </div>
  </main>

  <footer class="gate__foot">
    <span>© Shreyasee Chand 2026</span>
    <span>Handcrafted with care, powered by AI</span>
  </footer>

  <script>
    /* The password is verified SERVER-SIDE by /api/login (Vercel). It is never
       present in this page's source. On success the server sets an HttpOnly
       auth cookie and we forward the visitor into the site. */
    const gate   = document.getElementById("gate");
    const form   = document.getElementById("gateForm");
    const input  = document.getElementById("gateInput");
    const submit = document.getElementById("gateSubmit");
    const error  = document.getElementById("gateError");

    function reject() {
      error.classList.add("is-visible");
      gate.classList.remove("is-shaking");
      void gate.offsetWidth; // reflow so the shake replays
      gate.classList.add("is-shaking");
      input.select();
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      submit.disabled = true;
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: input.value }),
        });
        if (res.ok) {
          const back = new URLSearchParams(location.search).get("from");
          location.replace(back || "/");
          return;
        }
      } catch (_) { /* network error → treat as failure */ }
      submit.disabled = false;
      reject();
    });

    input.addEventListener("input", function () {
      error.classList.remove("is-visible");
    });
  </script>
</body>
</html>
