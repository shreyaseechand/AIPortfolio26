<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shreyasee Chand — Enter password (Option B · Light)</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#f2ede3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1a1a17;
      --body: #45433c;
      --muted: #8a8578;
      --paper: #f2ede3;          /* warm wabi-sabi paper */
      --paper-deep: #ebe4d7;
      --accent: #c0392b;         /* hinomaru red */
      --r-md: 8px;
      --font-display: "Cormorant Garamond", "EB Garamond", Garamond, "Times New Roman", serif;
      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--paper);
      color: var(--body);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
      display: flex; flex-direction: column;
    }
    .gate {
      position: relative; flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 40px; overflow: hidden;
    }
    /* concentric ink rings bleeding from the right edge (like the wood print) */
    .gate::before {
      content: ""; position: absolute; z-index: 0;
      top: 50%; right: -38%; transform: translateY(-50%);
      width: 115vh; height: 115vh; max-width: 1100px; max-height: 1100px;
      background-image: url("assets/img/FooterBgnd.webp");
      background-size: cover; background-position: center;
      border-radius: 50%;
      opacity: .5; mix-blend-mode: multiply;
      -webkit-mask-image: radial-gradient(circle, #000 55%, transparent 74%);
              mask-image: radial-gradient(circle, #000 55%, transparent 74%);
    }
    /* subtle paper vignette to keep text legible */
    .gate::after {
      content: ""; position: absolute; inset: 0; z-index: 0;
      background: radial-gradient(120% 90% at 35% 45%, rgba(242,237,227,.65), rgba(242,237,227,0) 60%);
      pointer-events: none;
    }
    .gate__inner {
      position: relative; z-index: 1; width: 100%; max-width: 460px; text-align: center;
      animation: rise 1s cubic-bezier(.2,.6,.2,1) both;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .seal {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); margin: 0 auto 26px;
      box-shadow: 0 0 0 6px rgba(192,57,43,.08);
    }
    .name {
      font-family: var(--font-display); font-weight: 500;
      font-size: clamp(40px, 6.6vw, 64px); line-height: 1.03;
      letter-spacing: -1.2px; color: var(--ink);
    }
    .role {
      font-family: var(--font-mono); font-size: 12px; font-weight: 400;
      letter-spacing: 6px; text-transform: uppercase;
      color: var(--muted); margin-top: 16px;
    }

    .form {
      margin-top: 44px; display: inline-flex; align-items: stretch;
      width: min(360px, 100%);
      border: 1px solid rgba(26,26,23,.20); border-radius: var(--r-md);
      background: rgba(255,255,255,.35); overflow: hidden;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .form:focus-within { border-color: rgba(26,26,23,.5); box-shadow: 0 0 0 4px rgba(26,26,23,.05); }
    .input {
      flex: 1; background: transparent; border: 0; outline: 0;
      color: var(--ink); font-family: var(--font-body); font-size: 15px; padding: 15px 18px;
    }
    .input::placeholder { color: var(--muted); }
    .submit {
      flex: none; width: 54px; border: 0; border-left: 1px solid rgba(26,26,23,.20);
      background: var(--ink); color: var(--paper); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background-color .18s ease;
    }
    .submit:hover { background: #000; }
    .submit svg { width: 18px; height: 18px; transition: transform .18s ease; }
    .submit:hover svg { transform: translateX(3px); }

    .error { min-height: 18px; margin-top: 18px; font-size: 13px; color: #a2402f; opacity: 0; transition: opacity .2s ease; }
    .error.is-visible { opacity: 1; }
    .gate.is-shaking .form { animation: shake .4s ease; }
    @keyframes shake {
      10%,90%{transform:translateX(-1px)} 20%,80%{transform:translateX(2px)}
      30%,50%,70%{transform:translateX(-5px)} 40%,60%{transform:translateX(5px)}
    }

    .foot {
      position: relative; z-index: 1;
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; flex-wrap: wrap; padding: 22px 40px;
      font-size: 13px; color: var(--muted);
    }
    @media (max-width: 560px) {
      .foot { justify-content: center; text-align: center; }
      .gate::before { right: -55%; opacity: .38; }
    }
  </style>
</head>
<body>
  <main class="gate" id="gate">
    <div class="gate__inner">
      <div class="seal" aria-hidden="true"></div>
      <h1 class="name">Shreyasee Chand</h1>
      <p class="role">Product Designer</p>
      <form class="form" id="gateForm" autocomplete="off">
        <input class="input" id="gateInput" type="password" name="site-password" placeholder="Password" aria-label="Password" autofocus required />
        <button class="submit" type="submit" id="gateSubmit" aria-label="Enter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
      <p class="error" id="gateError" role="alert">Incorrect password. Try again.</p>
    </div>
  </main>
  <footer class="foot">
    <span>© Shreyasee Chand 2026</span>
    <span>Handcrafted with care, powered by AI</span>
  </footer>
  <script src="gate.js"></script>
</body>
</html>
